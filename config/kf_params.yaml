# ---------------------------------------------------------------------------
# Initial VIO-to-World frame alignment
# vio_translation_rel_pnp: position of VIO origin expressed in World frame (m)
# init_yaw_rad: yaw of VIO frame relative to World frame (rad)
# ---------------------------------------------------------------------------
init_pos_x: 0.0   # m 11.5
init_pos_y: 0.0   # m 15.0
init_pos_z: 0.0     # m
init_yaw_rad: -0.0 # rad

# ---------------------------------------------------------------------------
# Gate scene CSV path (used by GateMap)
# Relative paths are resolved from the package root (kf_vio_pnp_ros1/)
# ---------------------------------------------------------------------------
scene_csv_path: config/single_scene.csv

# ---------------------------------------------------------------------------
# Kalman filter noise parameters  (EKF full rigid-body)
# ---------------------------------------------------------------------------

# IMU accelerometer measurement noise std (m/s^2)
imu_accel_noise_std: 0.05

# IMU gyroscope measurement noise std (rad/s)
imu_gyro_noise_std: 0.005

# Accelerometer bias random-walk std (m/s^2 per sqrt(s))
accel_bias_rw_std: 0.001

# Gyroscope bias random-walk std (rad/s per sqrt(s))
gyro_bias_rw_std: 0.0001

# (legacy – kept for back-compat, not used by EKF)
vio_bias_rw_std: 0.005

# ---------------------------------------------------------------------------
# IMU Butterworth low-pass filter (2nd-order, applied before EKF propagation)
# ---------------------------------------------------------------------------
# Expected IMU publishing rate (Hz) – sets the Nyquist frequency
imu_sample_hz: 200.0
# Accelerometer cutoff frequency (Hz)
imu_accel_cutoff_hz: 30.0
# Gyroscope cutoff frequency (Hz)
imu_gyro_cutoff_hz: 50.0

# VIO observation noise
vio_pos_std: 0.05   # m
vio_vel_std: 0.05   # m/s
vio_quat_std: 0.001  # rad  (orientation quaternion noise, fused with pos+vel in 9-DOF update)

# PnP observation noise (more reliable position source)
pnp_pos_std: 0.10   # m

# ---------------------------------------------------------------------------
# VIO delay compensation
# ---------------------------------------------------------------------------
vio_delay_compensation: true
vio_delay_sec: 0.0667   # seconds

# ---------------------------------------------------------------------------
# Gate pose (PnP) delay compensation
# The gate pose message arrives with a processing delay; subtract this from
# the header timestamp before aligning with the IMU buffer.
# ---------------------------------------------------------------------------
gate_pose_delay_sec: 0.1   # seconds (default 100 ms)

# ---------------------------------------------------------------------------
# MoCap gating options
# ---------------------------------------------------------------------------
# Measurement passing mode: continuous | downsampled | periodic
mocap_mode: periodic

# Target output rate when mode is 'downsampled' or inside a 'periodic' window (Hz)
# Assumed input rate is 100 Hz
mocap_freq: 10.0

# 'periodic' mode: duration (s) of the available and unavailable windows
mocap_available_duration: 2.0
mocap_unavailable_duration: 10.0


